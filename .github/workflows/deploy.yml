name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Gate estricto: solo dependencias que llegan al navegador.
      # Una vuln high+ en prod bloquea el deploy.
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      # Informativo: vulns en dev deps (vite, tsc, eslint…) no bloquean,
      # pero las vemos en los logs para priorizarlas.
      - name: Audit dev dependencies (informative)
        run: npm audit --audit-level=high
        continue-on-error: true

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
